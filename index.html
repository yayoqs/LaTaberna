<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Taberna</title>

  <!-- FontAwesome desde CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- CSS Modular -->
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/mesas.css">
  <link rel="stylesheet" href="css/pedido.css">
  <link rel="stylesheet" href="css/kds.css">
  <link rel="stylesheet" href="css/caja.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/ticket.css">
  <link rel="stylesheet" href="css/despensa.css">
  <link rel="stylesheet" href="css/recetas.css">
  <link rel="stylesheet" href="css/reparto.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .item-persona-badge {
      font-size: 10px; background: var(--color-primary); color: white;
      padding: 2px 6px; border-radius: 99px; margin-left: 6px;
    }
    .cierre-persona-group { margin-bottom: 12px; border-bottom: 1px dashed var(--color-border); }
    .cierre-persona-header { font-weight: bold; display: flex; justify-content: space-between; }
    .pago-persona-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  </style>
</head>
<body>

  <!-- HEADER FIJO -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <i class="fas fa-beer"></i>
        <span>LaTaberna</span>
      </div>
      <div class="header-info">
        <span id="currentDate"></span>
        <span id="currentTime"></span>
      </div>
    </div>

    <nav class="header-nav">
      <button class="nav-btn" data-view="mesas" onclick="App.showView('mesas')" data-rol="mesero,admin,master,caja">
        <i class="fas fa-chair"></i><span> Mesas</span>
      </button>
      <button class="nav-btn" data-view="cocina" onclick="App.showView('cocina')" data-rol="cocina,barra,admin,master">
        <i class="fas fa-fire-burner"></i><span> Cocina</span>
      </button>
      <button class="nav-btn" data-view="caja" onclick="App.showView('caja')" data-rol="caja,admin,master">
        <i class="fas fa-cash-register"></i><span> Caja</span>
      </button>
      <button class="nav-btn" data-view="despensa" onclick="App.showView('despensa')" data-rol="admin,master,cocina,barra">
        <i class="fas fa-boxes"></i><span> Despensa</span>
      </button>
      <button class="nav-btn" data-view="recetas" onclick="App.showView('recetas')" data-rol="cocina,barra,admin,master">
        <i class="fas fa-book"></i><span> Recetas</span>
      </button>
      <button class="nav-btn" data-view="reparto" onclick="App.showView('reparto')" data-rol="admin,master,reparto">
        <i class="fas fa-motorcycle"></i><span> Reparto</span>
      </button>
      <button class="nav-btn" data-view="menu" onclick="App.showView('menu')" data-rol="cliente,mesero,admin,master,caja">
        <i class="fas fa-utensils"></i><span> Menú</span>
      </button>
      <button class="nav-btn" data-view="eventos" onclick="App.showView('eventos')" data-rol="eventos,admin,master">
        <i class="fas fa-calendar-alt"></i><span> Eventos</span>
      </button>
      <button class="nav-btn" data-view="perfil" onclick="App.showView('perfil')" data-rol="mesero,admin,master,caja,cocina,barra,despensa,eventos,reparto,cliente">
        <i class="fas fa-id-card"></i><span> Perfil</span>
      </button>
      <button class="nav-btn" data-view="config" onclick="App.showView('config')" data-rol="admin,master">
        <i class="fas fa-sliders"></i><span> Config</span>
      </button>
    </nav>

    <div class="header-right">
      <button class="btn-secondary" onclick="App.cerrarTurnoApp()" title="Cerrar Turno" style="padding:6px 10px;" data-rol="admin,master">
        <i class="fas fa-door-closed"></i><span> Cerrar Turno</span>
      </button>
      <span id="usuarioActualDisplay" style="margin:0 12px; font-size:13px; color:var(--color-text-sec);"></span>
      <button class="btn-secondary" onclick="Auth.logout()" title="Cerrar sesión" style="padding:6px 10px;">
        <i class="fas fa-sign-out-alt"></i>
      </button>
      <div class="mozo-selector">
        <!-- dinámico -->
      </div>
    </div>
  </header>

  <!-- VISTAS GENERADAS POR MÓDULOS JS -->

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════════════════════════
       SCRIPTS: orden obligatorio
       ═══════════════════════════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/lib/logger.js"></script>        <!-- Logger + ErrorHandler -->
  <script src="js/lib/eventBus.js"></script>
  <script src="js/lib/command-bus.js"></script>
  <script src="js/lib/store.js"></script>
  <script src="js/lib/deps.js"></script>          <!-- Contenedor de dependencias -->

  <!-- Base de datos (core, sync, inventario, fusión) -->
  <script src="js/db-core.js"></script>
  <script src="js/db-sync.js"></script>
  <script src="js/db-inventario.js"></script>
  <script src="js/db-fusion.js"></script>
  <script src="js/db.js"></script>

  <!-- Roles y Autenticación -->
  <script src="js/roles.js"></script>
  <script src="js/auth.js"></script>

  <!-- Dominio y Servicios (DDD) -->
  <script src="js/dominio/resultado.js"></script>
  <script src="js/dominio/dinero.js"></script>
  <script src="js/dominio/cantidad.js"></script>
  <script src="js/dominio/direccion.js"></script>
  <script src="js/dominio/pedido.js"></script>
  <script src="js/dominio/delivery.js"></script>
  <script src="js/dominio/ingrediente.js"></script>
  <script src="js/servicios/pedido-service.js"></script>
  <script src="js/servicios/delivery-service.js"></script>
  <script src="js/servicios/inventario-service.js"></script>

  <!-- Comandos CQRS -->
  <script src="js/comandos/crear-pedido-mesa.js"></script>
  <script src="js/comandos/enviar-comanda.js"></script>

  <!-- Repositorios -->
  <script src="js/repositorios/pedido-repository.js"></script>

  <!-- Managers -->
  <script src="js/managers/pedido-manager.js"></script>
  <script src="js/managers/turno-manager.js"></script>

  <!-- UI (vistas) -->
  <script src="js/ui/mesas.js"></script>
  <script src="js/ui/carta.js"></script>
  <script src="js/ui/comanda.js"></script>
  <script src="js/ui/cuenta.js"></script>
  <script src="js/ui/cobro.js"></script>
  <script src="js/ui/pedido-ui.js"></script>
  <script src="js/ui/kds.js"></script>
  <script src="js/ui/caja.js"></script>
  <script src="js/ui/tickets.js"></script>
  <script src="js/ui/config.js"></script>
  <script src="js/ui/despensa.js"></script>
  <script src="js/ui/recetas.js"></script>
  <script src="js/ui/reparto.js"></script>
  <script src="js/ui/menu.js"></script>
  <script src="js/ui/eventos.js"></script>
  <script src="js/ui/perfil.js"></script>

  <!-- Bootstrap (inicialización general) -->
  <script src="js/bootstrap.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
